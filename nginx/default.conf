server {
    listen 80;
    server_name _;

    # Serve the Vite/React static build
    root /usr/share/nginx/html;
    index index.html;

    # SPA: all unknown routes go to index.html (React Router handles them)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend container
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;   # allow for LLM streaming responses
    }

    # Proxy SSE (Server-Sent Events) – disable buffering for real-time streaming
    location /api/chat/stream {
        proxy_pass              http://backend:8000;
        proxy_http_version      1.1;
        proxy_set_header        Connection "";
        proxy_buffering         off;
        proxy_cache             off;
        proxy_read_timeout      600s;
        chunked_transfer_encoding on;
    }

    # Security headers
    add_header X-Frame-Options       "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"    always;
    add_header Referrer-Policy       "no-referrer" always;

    # Gzip (reduces bandwidth on the local network)
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}
