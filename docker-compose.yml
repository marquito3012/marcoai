services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: marcoai_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./data:/app/data
    env_file:
      - .env
    depends_on:
      - db_init
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Contenedor auxiliar rápido para crear la carpeta de DB con permisos
  db_init:
    image: alpine
    volumes:
      - ./data:/data
    command: sh -c "mkdir -p /data && chown -R 1000:1000 /data"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: marcoai_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: marcoai_tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    env_file:
      - .env
    depends_on:
      - frontend

# Eliminamos la sección de volumes nombrados para usar bind mounts locales
