# ─────────────────────────────────────────────────────────────────────────────
# MarcoAI – docker-compose.yml
#
# Services:
#   backend  – FastAPI monolith (all agents + API)
#   nginx    – Serves the React/Vite static build (ultra-light, ~5 MB RAM)
#
# SD-protection strategies applied:
#   • logging driver with strict size limits
#   • no tmpfs for DB (volume-mounted for persistence)
#   • swap disabled on the host (to be done at OS level on RPi)
#
# Memory budget (RPi 3 = 1 GB RAM):
#   backend  ≤ 400 MB
#   nginx    ≤  32 MB
#   OS host  ~350–400 MB free
# ─────────────────────────────────────────────────────────────────────────────
services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: marcoai_backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # SQLite database persisted on the SD card via a named volume
      - db_data:/app/data
      # Private cloud files uploaded by users
      - user_files:/app/uploads
    ports:
      - "8000:8000"
    deploy:
      resources:
        limits:
          memory: 400M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    container_name: marcoai_nginx
    restart: unless-stopped
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 32M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  db_data:
  user_files:
