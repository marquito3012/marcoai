<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Welcome to Marco AI — Your personal AI assistant dashboard.">
  <title>Marco AI — Login</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">

  <!-- Fonts: Fira Code + Fira Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            deep:     '#0B0F19',
            surface:  '#111827',
            glass:    'rgba(255, 255, 255, 0.04)',
            'border-g': 'rgba(255, 255, 255, 0.08)',
            'txt':    '#F1F5F9',
            'txt-2':  '#94A3B8',
            accent:   '#3B82F6',
            'accent-d':'#2563EB',
          },
          fontFamily: {
            mono: ['"Fira Code"', 'monospace'],
            sans: ['"Fira Sans"', 'system-ui', 'sans-serif'],
          },
        },
      },
    }
  </script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js" defer></script>

  <style>
    body { background-color: #0B0F19; color: #F1F5F9; font-family: 'Fira Sans', sans-serif; overflow: hidden; }
    .bg-glow {
      position: fixed; width: 400px; height: 400px; border-radius: 50%;
      background: rgba(59, 130, 246, 0.15); filter: blur(100px); z-index: -1; animation: float 20s infinite alternate;
    }
    @keyframes float { 0% { transform: translate(0,0); } 100% { transform: translate(10vw, 10vh); } }

    .login-card {
      background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 32px;
      padding: 48px; width: 100%; max-width: 440px; box-shadow: 0 25px 60px -15px rgba(0,0,0,0.5);
      animation: slideUp 800ms cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
    
    .btn-google {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      background: white; color: #0F172A; padding: 14px; border-radius: 16px;
      font-weight: 700; font-size: 0.9375rem; transition: all 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .btn-google:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(255,255,255,0.2); }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

  <!-- Background Glare -->
  <div class="bg-glow top-0 left-0" style="background: rgba(59, 130, 246, 0.1);"></div>
  <div class="bg-glow bottom-0 right-0" style="background: rgba(139, 92, 246, 0.08); animation-delay: -5s;"></div>

  <main class="login-card text-center relative">
    <!-- Icon Container -->
    <div class="inline-flex items-center justify-center w-20 h-20 rounded-3xl bg-accent/10 border border-accent/20 mb-10">
      <i data-lucide="sparkles" class="w-10 h-10 text-accent"></i>
    </div>

    <!-- Typography -->
    <h1 class="font-mono font-bold text-3xl mb-4 tracking-tight">Marco AI</h1>
    <p class="text-txt-2 text-sm leading-relaxed mb-10 max-w-[280px] mx-auto">
      Your personal assistant for daily habits, budget, and schedules. Connect to begin.
    </p>

    <!-- Google Login Trigger -->
    <a href="/auth/login" class="btn-google group">
      <svg class="w-5 h-5" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </a>

    <!-- Footer Meta -->
    <footer class="mt-10 pt-8 border-t border-white/5">
      <p class="text-[10px] text-txt-m uppercase tracking-widest font-bold">Secure Entry Point — Version 0.1.0</p>
    </footer>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof lucide !== 'undefined') lucide.createIcons();
    });
  </script>
</body>
</html>
