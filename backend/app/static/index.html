<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Marco AI — Your personal AI assistant dashboard for calendar, finance, and habits.">
  <title>Marco AI</title>

  <!-- Fonts: Fira Code (headings/data) + Fira Sans (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Tailwind CSS Play CDN (no build step) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            deep:     '#0B0F19',
            surface:  '#111827',
            glass:    'rgba(255, 255, 255, 0.04)',
            'glass-hover': 'rgba(255, 255, 255, 0.07)',
            'border-g': 'rgba(255, 255, 255, 0.08)',
            'border-g-hover': 'rgba(255, 255, 255, 0.14)',
            'txt':    '#F1F5F9',
            'txt-2':  '#94A3B8',
            'txt-m':  '#64748B',
            accent:   '#3B82F6',
            'accent-d':'#2563EB',
            amber:    '#F59E0B',
            emerald:  '#10B981',
            rose:     '#F43F5E',
            violet:   '#8B5CF6',
          },
          fontFamily: {
            mono: ['"Fira Code"', 'monospace'],
            sans: ['"Fira Sans"', 'system-ui', 'sans-serif'],
          },
          borderRadius: {
            'glass': '14px',
          },
        },
      },
    }
  </script>

  <!-- Lucide Icons (SVG icon library via CDN) -->
  <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js" defer></script>

  <!-- Custom styles (v11 Pro-Max cache-bust) -->
  <link rel="stylesheet" href="/static/css/style.css?v=11">
</head>
<body class="bg-deep text-txt font-sans min-h-screen overflow-x-hidden">

  <!-- ========== NAVBAR ========== -->
  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <div class="flex items-center gap-2.5">
      <span class="logo-dot" aria-hidden="true"></span>
      <span class="font-mono font-bold text-lg text-txt">Marco AI</span>
    </div>
    <div class="flex items-center gap-2">
      <!-- User profile (shown when logged in) -->
      <div id="nav-user" class="flex items-center gap-2.5" style="display:none !important">
        <img id="nav-avatar" src="" alt="Profile picture"
             class="w-8 h-8 rounded-full border border-white/10 object-cover">
        <span id="nav-name" class="text-sm text-txt-2 font-sans hidden sm:block"></span>
        <a href="/auth/logout"
           class="p-2 rounded-lg text-txt-2 hover:text-rose hover:bg-white/5 transition-colors duration-200"
           title="Sign out"
           aria-label="Sign out">
          <i data-lucide="log-out" class="w-4 h-4"></i>
        </a>
      </div>
      <!-- Clean settings button (no onclick, listener in app.js) -->
      <button type="button" id="btn-settings-nav" aria-label="Settings"
              class="p-2 rounded-lg text-txt-2 hover:text-txt hover:bg-white/5 transition-colors duration-200">
        <i data-lucide="settings" class="w-5 h-5"></i>
      </button>
    </div>
  </nav>

  <!-- ========== DASHBOARD GRID ========== -->
  <main class="dashboard">

    <!-- LEFT COLUMN -->
    <section class="panel-left flex flex-col gap-4">

      <!-- CALENDAR CARD -->
      <article class="card" id="card-calendar">
        <div class="card-header">
          <h2><i data-lucide="calendar"></i> Calendar</h2>
        </div>
        <div id="calendar-content">
          <div id="event-list">
            <div class="skeleton-block"></div>
          </div>
          <div class="calendar-nav">
            <button type="button" id="cal-prev" aria-label="Previous day" class="cal-nav-btn">
              <i data-lucide="chevron-left"></i> Prev
            </button>
            <span class="font-mono text-sm text-txt" id="cal-date"></span>
            <button type="button" id="cal-next" aria-label="Next day" class="cal-nav-btn">
              Next <i data-lucide="chevron-right"></i>
            </button>
          </div>
        </div>
      </article>

      <!-- FINANCE CARD -->
      <article class="card" id="card-finance">
        <div class="card-header">
          <h2><i data-lucide="wallet"></i> Finance</h2>
          <span class="text-sm text-txt-m font-mono" id="finance-month"></span>
        </div>
        <div class="grid grid-cols-2 gap-2.5 mb-3">
          <div class="finance-stat income">
            <div class="label">Income</div>
            <div class="value" id="finance-income">—</div>
          </div>
          <div class="finance-stat expense">
            <div class="label">Expenses</div>
            <div class="value" id="finance-expense">—</div>
          </div>
        </div>
        <div class="finance-balance">
          <div class="label">Balance</div>
          <div class="value" id="finance-balance">—</div>
        </div>
      </article>

      <!-- HABITS CARD -->
      <article class="card" id="card-habits">
        <div class="card-header">
          <h2><i data-lucide="heart-pulse"></i> Habits</h2>
          <span class="text-sm text-txt-m">Today</span>
        </div>
        <div id="habit-list">
          <div class="skeleton-block"></div>
        </div>
        <div class="habit-streak" id="habit-streak" style="display:none">
          <i data-lucide="flame"></i>
          <span id="streak-count"></span>
        </div>
      </article>

    </section>

    <!-- RIGHT COLUMN: CHAT -->
    <section class="panel-right">
      <article class="card chat-panel" id="card-chat">
        <div class="card-header">
          <h2><i data-lucide="message-circle"></i> Chat</h2>
          <span class="text-xs text-txt-m" id="chat-status">Online</span>
        </div>

        <div class="chat-messages" id="chat-messages" role="log" aria-live="polite">
          <div class="chat-welcome" id="chat-welcome">
            <i data-lucide="sparkles"></i>
            <p>Hey! I'm <strong>Marco</strong>. Ask me anything — manage your calendar, check your budget, or track a habit.</p>
          </div>
        </div>

        <div class="chat-input-bar">
          <label for="chat-input" class="sr-only">Type a message</label>
          <input type="text" id="chat-input" placeholder="Type a message..." autocomplete="off">
          <button type="button" id="chat-send" aria-label="Send message">
            <i data-lucide="send-horizontal"></i>
          </button>
        </div>
      </article>
    </section>

  </main>

  <!-- ========== SETTINGS MODAL (v11) ========== -->
  <div id="modal-settings" class="modal-overlay" style="display:none">
    <article class="modal-content card max-w-sm w-full mx-4 overflow-hidden">
      <div class="card-header border-b border-white/5 pb-4 mb-5">
        <h2 class="flex items-center gap-2 text-white font-mono uppercase tracking-wider text-sm">
          <i data-lucide="settings" class="w-4 h-4 text-accent"></i> Settings
        </h2>
        <button type="button" id="settings-close" class="p-1.5 hover:bg-white/10 rounded-lg transition-all" aria-label="Close settings">
          <i data-lucide="x" class="w-5 h-5 text-txt-2"></i>
        </button>
      </div>
      
      <div class="space-y-6">
        <!-- Language Selection -->
        <div class="space-y-4">
          <label class="text-xs font-bold text-txt-m uppercase tracking-widest block">Agent Language</label>
          <div class="grid grid-cols-2 gap-3" role="radiogroup" aria-label="Select language">
            <button type="button" data-lang="en" class="lang-btn" role="radio" aria-checked="false">
              <span>English</span>
              <i data-lucide="check-circle" class="w-4 h-4 check-icon text-accent"></i>
            </button>
            <button type="button" data-lang="es" class="lang-btn" role="radio" aria-checked="false">
              <span>Español</span>
              <i data-lucide="check-circle" class="w-4 h-4 check-icon text-accent"></i>
            </button>
          </div>
          <p class="text-[11px] text-txt-m leading-relaxed italic">Marco will adapt his thinking and responses to your preferred language.</p>
        </div>
      </div>

      <div class="mt-8 pt-5 border-t border-white/5 flex justify-end">
        <button type="button" id="settings-save" class="px-6 py-2.5 bg-accent hover:bg-accent-d text-white rounded-xl font-bold text-sm transition-all shadow-lg shadow-accent/20">
          Save Changes
        </button>
      </div>
    </article>
  </div>

  <!-- App Script (v11 Pro-Max cache-bust) -->
  <script src="/static/js/app.js?v=11"></script>
</body>
</html>
